# ━━━ Nginx config — DataSphere RH production ━━━
# 
# Usage : copier dans /etc/nginx/sites-available/datasphere-rh.conf
#         ln -s /etc/nginx/sites-available/datasphere-rh.conf /etc/nginx/sites-enabled/
#         nginx -t && systemctl reload nginx

upstream datasphere_rh {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=llm:10m rate=30r/m;

server {
    listen 80;
    server_name rh.datasphere.gn;
    
    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rh.datasphere.gn;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rh.datasphere.gn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rh.datasphere.gn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size (pour vision IA — images base64)
    client_max_body_size 20M;

    # ━━━ API endpoints ━━━

    # API publique v1 — rate limiting strict
    location /api/v1/ {
        limit_req zone=llm burst=10 nodelay;
        proxy_pass http://datasphere_rh;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s; # LLM calls peuvent être longs
    }

    # SSE streaming — pas de buffering
    location /api/llm/stream {
        proxy_pass http://datasphere_rh;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Analytics live SSE
    location /api/analytics-live {
        proxy_pass http://datasphere_rh;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Health check — pas de rate limiting
    location /api/health {
        proxy_pass http://datasphere_rh;
        access_log off;
    }

    # Metrics — restricted (ajouter allow IP)
    location /api/metrics {
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
        proxy_pass http://datasphere_rh;
        access_log off;
    }

    # API docs (Swagger UI)
    location /api-docs {
        proxy_pass http://datasphere_rh;
    }

    # Cron endpoints — restricted (IP interne uniquement)
    location /api/cron/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://datasphere_rh;
    }

    # Autres API — rate limiting modéré
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://datasphere_rh;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static files (Next.js)
    location /_next/static/ {
        proxy_pass http://datasphere_rh;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    # Default — Next.js app
    location / {
        proxy_pass http://datasphere_rh;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
